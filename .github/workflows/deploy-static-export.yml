name: Deploy Static Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export-and-deploy:
    name: Export and deploy static site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Export static site
        run: python export_static.py

      - name: Deploy dist/ to Pages repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: ${{ vars['WEBSITE_DEPLOY_BRANCH'] || 'build' }}
          repository-name: ${{ vars['WEBSITE_DEPLOY_REPOSITORY'] }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          clean: true
          single-commit: true
          commit-message: "deploy: static export from ${{ github.sha }}"