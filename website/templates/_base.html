<!doctype html>
<html lang="en">
  <head>
    {% include '_head.html' %}
  </head>
  <body
    data-page="{% if request.endpoint == 'main.index' %}overview{% elif request.endpoint == 'main.film' %}film{% elif request.endpoint == 'main.media' %}gallery{% elif request.endpoint == 'main.connect' %}support{% elif request.endpoint == 'main.patreon' %}patreon{% endif %}"
  >
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="site-background" aria-hidden="true">
      <video
        class="site-background-video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        poster="{{ url_for('static', filename='images/P1044615.JPG') }}"
      >
        <source
          src="{{ url_for('static', filename='video/drive.webm') }}"
          type="video/webm"
        />
        <source
          src="{{ url_for('static', filename='video/drive.mp4') }}"
          type="video/mp4"
        />
      </video>
      <div class="site-background-overlay"></div>
    </div>
    <header class="site-header">{% include '_nav.html' %}</header>
    {% block page_content %}{% endblock %}
    <footer class="site-footer">{% include '_footer.html' %}</footer>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
      var _paq = (window._paq = window._paq || []);
      _paq.push(["trackPageView"]);
      _paq.push(["enableLinkTracking"]);
      (function () {
        var u = "//s.allucanget.biz/";
        _paq.push(["setTrackerUrl", u + "matomo.php"]);
        _paq.push(["setSiteId", "2"]);
        var d = document,
          g = d.createElement("script"),
          s = d.getElementsByTagName("script")[0];
        g.async = true;
        g.src = u + "matomo.js";
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
