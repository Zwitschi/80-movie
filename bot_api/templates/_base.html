<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Bot API{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <style>
      body { font-family: Inter, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; }
      .container { max-width: 1200px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; }
      nav ul { list-style: none; padding: 0; display: flex; gap: 1rem; flex-wrap: wrap; }
      nav a { text-decoration: none; color: #2563eb; }
      nav a:hover { text-decoration: underline; }
      h1 { margin-top: 0; }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <header><h1>{% block admin_title %}Bot API{% endblock %}</h1></header>
      <main>{% block admin_content %}{% endblock %}</main>
    </div>
  </body>
</html>
