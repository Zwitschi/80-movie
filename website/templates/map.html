<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeslaCam Route Replay</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #17130f;
        --panel: rgba(27, 21, 16, 0.88);
        --line: rgba(255, 247, 238, 0.16);
        --text: #fff8ef;
        --muted: rgba(255, 248, 239, 0.72);
        --accent: #37d123;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
      }

      #map {
        position: fixed;
        inset: 0;
      }

      h1 {
        margin: 12px 0 6px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .timeline {
        position: fixed;
        right: 20px;
        top: 20px;
        bottom: 20px;
        width: min(360px, calc(100vw - 40px));
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(14, 11, 9, 0.8);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        z-index: 2;
      }

      .timeline h2 {
        margin: 0 0 12px;
        font-size: 1rem;
      }

      .timeline-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .timeline-item strong {
        display: block;
        margin-bottom: 4px;
      }

      .timeline-item span {
        display: block;
        color: var(--muted);
        font-size: 0.9rem;
      }

      @media (max-width: 920px) {
        .timeline {
          position: static;
          width: auto;
          margin: 16px 20px 20px;
          max-height: 260px;
        }

        .hud {
          width: auto;
          right: 20px;
        }
      }

      /* Hide timeline by default */
      .timeline {
        display: none;
      }

      .car-marker {
        width: 32px;
        height: 32px;
        color: #37d123;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        transition: transform 0.1s linear;
      }

      .car-marker svg {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map" aria-label="TeslaCam route map"></div>
    <aside class="timeline">
      <h2>Waypoint Timeline</h2>
      <ul class="timeline-list" id="timeline-list"></ul>
    </aside>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.12.0/mapbox-gl.js"></script>
    <script>
      window.MAPBOX_ACCESS_TOKEN =
        "{{ config.get('MAPBOX_ACCESS_TOKEN', '') }}".trim();
      window.MAP_DATA_URL =
        "{{ url_for('static', filename='data/map_data.json') }}";
    </script>
    <script
      type="module"
      src="{{ url_for('static', filename='js/map.js') }}"
    ></script>
  </body>
</html>
